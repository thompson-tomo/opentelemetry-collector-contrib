name: "CodeQL Analysis"

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/README.md"

permissions: read-all

jobs:
  CodeQL-Build:
    runs-on: macos-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    if: ${{ github.actor != 'dependabot[bot]' }}
    env:
      # Force CodeQL to run the extraction on the files compiled by our custom
      # build command, as opposed to letting the autobuilder figure it out.
      # See: https://github.com/github/codeql-action/issues/1101#issuecomment-1157729589
      CODEQL_EXTRACTOR_GO_BUILD_TRACING: "on"

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - run: ./.github/workflows/scripts/free-disk-space.sh
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        id: go-setup
        with:
          go-version: oldstable
          cache-dependency-path: |
            internal/tools/go.sum
            testbed/go.sum

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4
        with:
          languages: go

      - name: Build Artifact
        run: |
          make genotelcontribcol
          make otelcontribcol

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4
        timeout-minutes: 60

      - run: ./.github/workflows/scripts/check-disk-space.sh
