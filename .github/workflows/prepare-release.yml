name: Automation - Prepare Release

on:
  workflow_dispatch:
    # Determine the version number that will be assigned to the release. During the beta phase, we increment
    # the minor version number and set the patch number to 0.
    inputs:
      candidate-beta:
        required: true
        description: Release candidate version (beta, like 0.70.0)

      current-beta:
        required: true
        description: Current version (beta, like 0.69.1)

      candidate-stable:
        required: true
        description: Release candidate version (stable, like 1.1.0)

      current-stable:
        required: true
        description: Current version (stable, like 1.0.0)
permissions:
  contents: read
jobs:
  # Releasing opentelemetry-collector-contrib
  prepare-release:
    permissions:
      contents: write # required for pushing changes in release-prepare-release.sh
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: "open-telemetry/opentelemetry-collector"
          path: opentelemetry-collector
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          path: opentelemetry-collector-contrib
      # Disable git's automatic maintenance to avoid go-git issues.
      # Workaround for https://github.com/go-git/go-git/issues/2242
      - name: Disable git auto maintenance
        run: git config --global maintenance.auto false
      - run: opentelemetry-collector-contrib/.github/workflows/scripts/free-disk-space.sh
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: oldstable
          cache: false
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: otelbot-token
        with:
          client-id: ${{ vars.OTELBOT_CLIENT_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}
      - name: Prepare release for contrib
        working-directory: opentelemetry-collector-contrib
        env:
          GITHUB_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          REPO: open-telemetry/opentelemetry-collector-contrib
          CANDIDATE_BETA: ${{ inputs.candidate-beta }}
          CURRENT_BETA: ${{ inputs.current-beta }}
          CANDIDATE_STABLE: ${{ inputs.candidate-stable }}
          CURRENT_STABLE: ${{ inputs.current-stable }}
        run: ./.github/workflows/scripts/release-prepare-release.sh
      - run: opentelemetry-collector-contrib/.github/workflows/scripts/check-disk-space.sh
