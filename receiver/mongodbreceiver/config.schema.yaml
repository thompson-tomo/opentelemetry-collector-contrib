$defs:
  query_sample_collection:
    type: object
    properties:
      max_rows_per_query:
        type: integer
        x-customType: uint64
  top_query_collection:
    description: TopQueryCollection holds configuration for the db.server.top_query log event collection.
    type: object
    properties:
      collection_interval:
        type: string
        format: duration
      max_explain_each_interval:
        type: integer
        x-customType: int64
      max_query_sample_count:
        type: integer
        x-customType: int64
      query_plan_cache_size:
        type: integer
      query_plan_cache_ttl:
        type: string
        format: duration
      top_query_count:
        type: integer
        x-customType: int64
type: object
properties:
  auth_mechanism:
    type: string
  auth_mechanism_properties:
    type: object
    additionalProperties:
      type: string
  auth_source:
    type: string
  direct_connection:
    type: boolean
  hosts:
    description: Deprecated - Transport option will be removed in v0.102.0
    type: array
    items:
      $ref: go.opentelemetry.io/collector/config/confignet.tcp_addr_config
  password:
    $ref: go.opentelemetry.io/collector/config/configopaque.string
  query_sample_collection:
    $ref: query_sample_collection
  replica_set:
    type: string
  scheme:
    type: string
  timeout:
    type: string
    format: duration
  top_query_collection:
    $ref: top_query_collection
  username:
    type: string
allOf:
  - $ref: go.opentelemetry.io/collector/scraper/scraperhelper.controller_config
  - $ref: go.opentelemetry.io/collector/config/configtls.client_config
  - $ref: ./internal/metadata.metrics_builder_config
  - $ref: ./internal/metadata.logs_builder_config
